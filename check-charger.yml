name: Ladestation prüfen

on:
  schedule:
    - cron: "*/5 * * * *"   # alle 5 Minuten
  workflow_dispatch:         # erlaubt manuelles Auslösen im GitHub-UI

permissions:
  contents: write            # damit der Workflow state.json committen darf

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Skript ausführen
        env:
          ENBW_SUBSCRIPTION_KEY: ${{ secrets.ENBW_SUBSCRIPTION_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_charger.py

      - name: Status-Datei committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Status-Update"
          git push
